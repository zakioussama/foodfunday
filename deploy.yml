---
- name: Deploy FoodFunday
  hosts: local
  become: no

  tasks:
    - name: Copy project files
      synchronize:
        src: /var/jenkins_home/workspace/foodfunday/
        dest: /home/oussama/foodfunday/
        rsync_opts:
          - "--exclude=.git"

    - name: Install composer dependencies
      command: composer install --no-interaction --prefer-dist
      args:
        chdir: /home/oussama/foodfunday

    - name: Copy env file
      command: cp .env.example .env
      args:
        chdir: /home/oussama/foodfunday

    - name: Generate app key
      command: php artisan key:generate
      args:
        chdir: /home/oussama/foodfunday

    - name: Run migrations
      command: php artisan migrate --force
      args:
        chdir: /home/oussama/foodfunday

    - name: Clear cache
      command: php artisan cache:clear
      args:
        chdir: /home/oussama/foodfunday

    - name: Set permissions
      file:
        path: /home/oussama/foodfunday/storage
        owner: www-data
        group: www-data
        recurse: yes
        mode: '0775'
