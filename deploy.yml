---
- name: Deploy FoodFunday
  hosts: local
  become: no

  tasks:
    - name: Copy project files
      shell: cp -r /var/jenkins_home/workspace/foodfunday/. /home/oussama/foodfunday/ 2>/dev/null || true

    - name: Run artisan commands via Docker
      shell: docker run --rm --volumes-from jenkins -v /home/oussama/foodfunday:/home/oussama/foodfunday -w /home/oussama/foodfunday foodfunday-ci bash -c "cp .env.example .env && php artisan key:generate && php artisan migrate --force && php artisan config:clear && php artisan cache:clear"
