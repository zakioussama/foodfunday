---
- name: Deploy FoodFunday
  hosts: local
  become: no

  tasks:
    - name: Copy project files
      shell: cp -r /var/jenkins_home/workspace/foodfunday/. /home/oussama/foodfunday/ 2>/dev/null || true

    - name: Copy env file
      shell: cp /home/oussama/foodfunday/.env.example /home/oussama/foodfunday/.env

    - name: Generate app key
      shell: php artisan key:generate
      args:
        chdir: /home/oussama/foodfunday

    - name: Run migrations
      shell: php artisan migrate --force
      args:
        chdir: /home/oussama/foodfunday

    - name: Clear cache
      shell: php artisan cache:clear
      args:
        chdir: /home/oussama/foodfunday
